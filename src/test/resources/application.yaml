spring:
  application:
    name: /reporting-api
  main:
    banner-mode: 'OFF'
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    # Turn turn on flyway migrattions
    enabled: true
  jpa:
    properties:
      jdbc:
        lob:
          non_contextual_creation: true
    show-sql: true
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}

logging:
  level:
    ROOT: ${LOGGING_LEVEL_ROOT:INFO}
    com:
      speedyteller:
        reporting: ${LOGGING_COM_SPEEDYTELLER:DEBUG}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v3

caching:
  spring:
    list: logins;users;transactions;customers;
    loginListTTL: 600000